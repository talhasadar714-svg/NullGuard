name: Publish NullShield to NuGet

on:
  push:
    tags:
      - 'v*'

# OIDC (Trusted Publishing) için gerekli olan kritik yetkilendirme bloğu
permissions:
  id-token: write
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x' # Sistemindeki .NET 9 SDK'sını hedefler

    - name: Restore Dependencies
      run: dotnet restore src/NullShield.Generators/NullShield.Generators.csproj

    - name: Build Project
      run: dotnet build src/NullShield.Generators/NullShield.Generators.csproj --configuration Release --no-restore

    - name: Pack NuGet Package
      run: dotnet pack src/NullShield.Generators/NullShield.Generators.csproj --configuration Release --output ./nupkg

    # API Key parametresi kaldırıldı, artık doğrudan Trusted Publishing ile güvenli yükleme yapılacak
    - name: Publish to NuGet.org
      run: dotnet nuget push "./nupkg/*.nupkg" --source https://api.nuget.org/v3/index.json --skip-duplicate