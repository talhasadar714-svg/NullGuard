name: Publish NullShield to NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore Dependencies
      run: |
        dotnet restore src/NullShield.Core/NullShield.Core.csproj
        dotnet restore src/NullShield.Generators/NullShield.Generators.csproj

    - name: Build Projects
      run: |
        dotnet build src/NullShield.Core/NullShield.Core.csproj --configuration Release --no-restore
        dotnet build src/NullShield.Generators/NullShield.Generators.csproj --configuration Release --no-restore

    - name: Pack NuGet Packages
      run: |
        dotnet pack src/NullShield.Core/NullShield.Core.csproj --configuration Release --output ./nupkg
        dotnet pack src/NullShield.Generators/NullShield.Generators.csproj --configuration Release --output ./nupkg

    - name: Publish to NuGet.org
      run: dotnet nuget push "./nupkg/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate